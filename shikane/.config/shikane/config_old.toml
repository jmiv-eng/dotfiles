[[profile]]
name = "laptop"
exec = ["notify-send shikane \"Profile $SHIKANE_PROFILE_NAME has been applied\""]
    [[profile.output]]
    match = "eDP-1"
    enable = true
    mode = { width = 1920, height = 1080, refresh = 60}
    position = { x = 0, y = 0 }

    [[profile.output]]
    search = "/DP-[0-9]/"
    enable = false
    
    [[profile.output]]
    search = "n%HDMI-"
    enable = false   
    scale = 1.0

[[profile]]
name = "conference"
exec = ["notify-send shikane \"Profile $SHIKANE_PROFILE_NAME has been applied\""]
    [[profile.output]]
    search = "n/HDMI-A-1"
    enable = true
    mode = { width = 2560, height = 1440, refresh = 60}
    position = { x = 1920, y = 0 }
    scale = 1.25

    [[profile.output]]
    match = "eDP-1"
    enable = true
    mode = { width = 1920, height = 1080, refresh = 60}
    position = { x = 0, y = 0 }
    scale = 1.0

