[[profile]]
name = "docked-ultrawide"
exec = ["notify-send shikane \"Profile $SHIKANE_PROFILE_NAME has been applied\""]
    [[profile.output]]
    search = ["m=C49RG9x", "s=H1AK500000", "v=Samsung Electric Company"]
    enable = true
    mode = { width = 5120, height = 1440, refresh = 119.970 }
    #mode = { width = 3840, height = 1080, refresh = 119.970 }
    position = { x = 0, y = 0 }
    #scale = 1.0
    scale = 1.25
    #modeline = 967.5 5128 5176 5208 5288 1440 1443 1453 1525 +hsync -vsync

    [[profile.output]]
    search = ["m=0x0809", "s=", "v=BOE"]
    enable = true 
    mode = { width = 3840, height = 2160, refresh = 60}
    position = { x = 4096, y = 0 }
    scale = 2.0 

