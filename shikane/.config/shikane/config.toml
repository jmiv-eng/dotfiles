    position = { x = 1920, y = 0 }
    scale = 1.25

    [[profile.output]]
    search = "eDP-1"
    enable = true
    mode = { width = 1920, height = 1080, refresh = 60 }
    position = { x = 0, y = 0 }
    scale = 1.0

