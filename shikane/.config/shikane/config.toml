# =============================================================================
# Work Laptop (vu) — BOE 3840x2160 + Samsung C49RG9x ultrawide
# =============================================================================

[[profile]]
name = "vu-laptop-docked-ultrawide"
exec = ["notify-send shikane \"Profile $SHIKANE_PROFILE_NAME has been applied\""]
    [[profile.output]]
    search = ["m=C49RG9x", "s=H1AK500000", "v=Samsung Electric Company"]
    enable = true
    mode = { width = 5120, height = 1440, refresh = 119.970 }
    position = { x = 0, y = 0 }
    scale = 1.25

    [[profile.output]]
    search = ["m=0x0809", "s=", "v=BOE"]
    enable = true
    mode = { width = 3840, height = 2160, refresh = 60 }
    position = { x = 4096, y = 0 }
    scale = 2.0

[[profile]]
name = "vu-laptop-conference"
exec = ["notify-send shikane \"Profile $SHIKANE_PROFILE_NAME has been applied\""]
    [[profile.output]]
    search = ["m=0x0809", "s=", "v=BOE"]
    enable = true
    mode = { width = 3840, height = 2160, refresh = 60 }
    position = { x = 0, y = 0 }
    scale = 2.0

    [[profile.output]]
    match = "HDMI-A-1"
    enable = true
    mode = { width = 4096, height = 2160, refresh = 24 }
    position = { x = 1920, y = 0 }
    scale = 2.0

[[profile]]
name = "vu-laptop-standalone"
exec = ["notify-send shikane \"Profile $SHIKANE_PROFILE_NAME has been applied\""]
    [[profile.output]]
    search = ["m=0x0809", "s=", "v=BOE"]
    enable = true
    mode = { width = 3840, height = 2160, refresh = 60 }
    position = { x = 0, y = 0 }
    scale = 2.0

# =============================================================================
# Work Laptop (wave) — eDP-1 1920x1080 + dock with DP-3/DP-4
# =============================================================================

[[profile]]
name = "wave-standalone"
exec = ["notify-send shikane \"Profile $SHIKANE_PROFILE_NAME has been applied\""]
    [[profile.output]]
    search = "eDP-1"
    enable = true
    mode = { width = 1920, height = 1080 }
    position = { x = 0, y = 0 }
    scale = 1.0

    [[profile.output]]
    search = "/DP-[0-9]/"
    enable = false

    [[profile.output]]
    search = "n%HDMI-"
    enable = false

[[profile]]
name = "wave-conference"
exec = ["notify-send shikane \"Profile $SHIKANE_PROFILE_NAME has been applied\""]
    [[profile.output]]
    search = "n/HDMI-A-1"
